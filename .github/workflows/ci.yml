name: CI

# Verifica calidad en cada push a main y en cada Pull Request.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Un push nuevo cancela la corrida anterior de la misma rama (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      # Instalación reproducible a partir de package-lock.json.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
